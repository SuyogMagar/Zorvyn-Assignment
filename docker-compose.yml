version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: financetracker-postgres
    ports:
      - "7432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
      POSTGRES_DB: financetracker
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:
